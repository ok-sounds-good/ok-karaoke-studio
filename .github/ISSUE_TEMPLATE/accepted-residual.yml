name: Accepted review follow-up
description: Track a confirmed review finding that the maintainer accepts for later work.
title: '[Review follow-up]: '
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for a confirmed finding that will remain after merge.
        Link the originating pull request in both directions so the decision stays auditable.
  - type: input
    id: origin
    attributes:
      label: Originating pull request or review
      placeholder: https://github.com/owner/repository/pull/123
    validations:
      required: true
  - type: textarea
    id: finding
    attributes:
      label: Finding and impact
      description: Describe the credible problem and its user or system impact.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why accepting it is reasonable now
      description: Record the maintainer's decision, constraints, and any current mitigation.
    validations:
      required: true
  - type: textarea
    id: completion
    attributes:
      label: Completion criteria
      description: State the correction and validation needed to close this follow-up.
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target or dependency
      placeholder: Milestone, later pull request, or roadmap section
  - type: checkboxes
    id: checks
    attributes:
      label: Tracking checks
      options:
        - label: The maintainer explicitly accepted this finding for later work.
          required: true
        - label: This Issue and the originating pull request link to each other.
          required: true
