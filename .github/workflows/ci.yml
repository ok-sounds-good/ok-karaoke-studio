name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit tests
    runs-on: ubuntu-slim
    env:
      FORMAT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Node.js 24.0.2
        uses: actions/setup-node@v6
        with:
          node-version: 24.0.2

      - name: Configure Bun 1.3.14
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Validate toolchain
        run: |
          test "$(node --version)" = "v24.0.2"
          test "$(bun --version)" = "1.3.14"

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting in changed lines
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            export FORMAT_BASE_SHA="$(git merge-base "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
            export FORMAT_BRANCH="${{ github.head_ref }}"
          else
            export FORMAT_BASE_SHA="$(git rev-parse HEAD^)"
            export FORMAT_BRANCH="$GITHUB_REF_NAME"
          fi
          bun scripts/format-diff.mjs --check \
            --path src \
            --path electron \
            --path tests \
            --path scripts \
            --path site \
            --path .github/workflows/pages.yml

      - name: Run portable test suite
        run: bun run test -- --exclude tests/visual-smoke-renderer-fatal-live.test.ts

      - name: Build renderer
        run: bun run build
