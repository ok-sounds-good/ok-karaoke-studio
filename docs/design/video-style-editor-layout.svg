  <rect x="296" y="419" width="178" height="36" rx="8" class="field"/>
  <circle cx="316" cy="437" r="10" fill="#ff8a2b"/>
  <text x="335" y="441" class="small">#FF8A2B</text>
  <text x="494" y="410" class="small">Unsung color</text>
  <rect x="494" y="419" width="178" height="36" rx="8" class="field"/>
  <circle cx="514" cy="437" r="10" fill="#72687d"/>
  <text x="533" y="441" class="small">#72687D</text>
  <rect x="296" y="482" width="376" height="61" rx="9" class="soft"/>
  <text x="312" y="506" class="label">Previewing project lyrics</text>
  <text x="312" y="525" class="small">Representative text appears on the video stage.</text>
  <line x1="278" y1="583" x2="688" y2="583" stroke="#ebe4f2"/>
  <rect x="493" y="598" width="72" height="31" rx="9" class="soft"/>
  <text x="529" y="618" text-anchor="middle" class="small">Cancel</text>
  <rect x="573" y="598" width="99" height="31" rx="9" class="button"/>
  <text x="622" y="618" text-anchor="middle" class="buttonText">Apply &amp; close</text>
  <rect x="696" y="66" width="576" height="576" rx="14" class="panel"/>
  <text x="714" y="88" class="tiny">STAGE MONITOR</text>
  <text x="714" y="111" class="heading">Live Preview &#xB7; Design mode</text>
  <rect x="720" y="140" width="528" height="297" rx="10" fill="url(#stage)"/>
  <rect x="755" y="173" width="458" height="231" rx="3" fill="none" stroke="#473c54" stroke-width="2"/>
  <text x="770" y="191" class="stageSmall">OKAY / STUDIO</text>
  <text x="1197" y="191" text-anchor="end" class="stageSmall">00:00.000</text>
  <text x="984" y="304" text-anchor="middle" class="stageMuted">
    <tspan fill="#ff8a2b">Sing the first words</tspan>
    <tspan> and see the rest</tspan>
  </text>
  <text x="770" y="386" class="stageSmall">UNKNOWN ARTIST &#xB7; UNTITLED SONG</text>
  <rect x="714" y="464" width="540" height="70" rx="9" class="soft"/>
  <text x="730" y="489" class="label">Fixed logical video stage</text>
  <text x="730" y="509" class="small">Representative project lyrics use the selected face, size, Sung, and Unsung.</text>
  <rect x="714" y="550" width="540" height="64" rx="9" fill="#fff8f1" stroke="#f2d2b9"/>
  <text x="730" y="576" class="label">Typography changes are not saved yet</text>
  <text x="730" y="595" class="small">Apply once or cancel the whole style session.</text>
  <rect y="650" width="1280" height="70" fill="#fff"/>
  <line x1="0" y1="650" x2="1280" y2="650" stroke="#ebe4f2"/>
  <rect x="16" y="659" width="220" height="52" rx="11" class="soft"/>
