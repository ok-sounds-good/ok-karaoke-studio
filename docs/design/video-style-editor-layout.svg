  <rect x="500" y="680" width="10" height="10" rx="2" fill="#70469e"/>
  <circle cx="566" cy="685" r="22" fill="#ff8a2b"/>
  <path d="M560 676l16 9-16 9z" fill="#3c200e"/>
  <text x="618" y="689" class="label">0:00.000 / 3:00.000</text>
  <text x="1100" y="689" class="small">1.0&#xD7; &#xB7; Volume</text>
