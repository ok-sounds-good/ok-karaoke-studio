  <line x1="278" y1="124" x2="688" y2="124" stroke="#ebe4f2"/>
  <g class="small">
    <rect x="294" y="140" width="74" height="28" rx="8" class="soft"/>
    <text x="331" y="158" text-anchor="middle">Background</text>
    <rect x="374" y="140" width="89" height="28" rx="8" fill="#f1eafa" stroke="#9b78cf"/>
    <text x="418" y="158" text-anchor="middle" fill="#70469e">Project lyrics</text>
    <rect x="469" y="140" width="80" height="28" rx="8" class="soft"/>
    <text x="509" y="158" text-anchor="middle">Title/frame</text>
    <rect x="555" y="140" width="55" height="28" rx="8" class="soft"/>
    <text x="582" y="158" text-anchor="middle">Vocal</text>
    <rect x="616" y="140" width="56" height="28" rx="8" class="soft"/>
    <text x="644" y="158" text-anchor="middle">Templates</text>
  </g>
  <text x="296" y="198" class="small">Typeface</text>
  <rect x="296" y="205" width="376" height="34" rx="8" class="field"/>
  <text x="310" y="227" class="label">System UI</text>
  <path d="M650 218l6 6 6-6" fill="none" stroke="#72677c"/>
  <text x="296" y="268" class="small">Face</text>
  <rect x="296" y="277" width="68" height="31" rx="8" class="soft"/>
  <text x="330" y="297" text-anchor="middle" class="small">Regular</text>
  <rect x="372" y="277" width="82" height="31" rx="8" fill="#f1eafa" stroke="#9b78cf"/>
  <text x="413" y="297" text-anchor="middle" class="label" fill="#70469e">Extra Bold</text>
  <rect x="462" y="277" width="59" height="31" rx="8" class="soft"/>
