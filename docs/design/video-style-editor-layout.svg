<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Accepted Video Style Editor layout at 1280 by 720</title>
  <desc id="desc">One acceptable same-window composition: Style sits beside the Okay Karaoke Studio identity, the inspector starts with Song details, and project lyric controls share the workspace with a fixed sixteen-by-nine Live Preview. The inspector may yield in production to preserve a practical preview.</desc>
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#322242"/>
      <stop offset="1" stop-color="#1e1629"/>
    </linearGradient>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#302b38}.label{font-size:11px;font-weight:700}.small{font-size:9px;fill:#62576e}.tiny{font-size:7px;fill:#72677c;font-weight:700;letter-spacing:.08em}.heading{font-size:16px;font-weight:800}.panel{fill:#fff;stroke:#d9cce9}.field{fill:#fff;stroke:#9a83ad}.soft{fill:#f3edf9;stroke:#d9cce9}.button{fill:#ff8a2b;stroke:#e66f12}.buttonText{fill:#3c200e;font-size:9px;font-weight:800}.stageMuted{fill:#b4acbd;font-size:21px;font-weight:800}.stageSmall{fill:#c1bbc7;font-size:7px;font-weight:700}
    </style>
  </defs>
  <rect width="1280" height="720" fill="#f8f6fb"/>
  <rect width="1280" height="58" fill="#fff"/>
  <line x1="0" y1="58" x2="1280" y2="58" stroke="#ebe4f2"/>
  <rect x="16" y="14" width="30" height="30" rx="9" fill="#aa8dde" stroke="#d8c9e9"/>
  <path d="M25 21h13v16H25z" fill="#fbf9fd" transform="rotate(-5 31 29)"/>
  <text x="56" y="25" class="label">Okay</text>
  <text x="56" y="39" class="tiny">KARAOKE STUDIO</text>
  <rect x="142" y="14" width="92" height="30" rx="9" fill="#f1eafa" stroke="#9b78cf"/>
  <path d="M152 23h14m-14 6h14m-14 6h14m-10-15v6m6 0v6m-8 0v6" fill="none" stroke="#70469e"/>
  <text x="198" y="33" text-anchor="middle" class="label" fill="#70469e">Style</text>
  <text x="510" y="33" class="small">Untitled song &#xB7; Editing</text>
  <rect x="1000" y="14" width="58" height="30" rx="8" class="soft"/>
  <text x="1029" y="33" text-anchor="middle" class="small">Save</text>
  <rect x="1067" y="14" width="84" height="30" rx="8" class="soft"/>
  <text x="1109" y="33" text-anchor="middle" class="small">Workflow</text>
  <rect x="1160" y="14" width="104" height="30" rx="9" class="button"/>
  <text x="1212" y="33" text-anchor="middle" class="buttonText">Export</text>
  <rect y="58" width="270" height="592" fill="#fcfbfd"/>
  <line x1="270" y1="58" x2="270" y2="650" stroke="#ebe4f2"/>
  <text x="16" y="84" class="tiny">SONG DETAILS</text>
  <text x="16" y="106" class="small">Title</text>
  <rect x="16" y="113" width="238" height="31" rx="8" class="field"/>
  <text x="27" y="133" class="small">Untitled song</text>
  <text x="16" y="166" class="small">Artist</text>
  <rect x="16" y="173" width="238" height="31" rx="8" class="field"/>
