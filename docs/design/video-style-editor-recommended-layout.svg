<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Recommended video style workspace at 1280 by 720</title>
  <desc id="desc">The literal minimum-size Studio layout with a 270 pixel Project inspector, a 390 pixel Video style editor, a contained 16 by 9 Live Preview, and the complete 70 pixel transport.</desc>
  <defs>
    <linearGradient id="stage-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173126"/>
      <stop offset="1" stop-color="#07100d"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #302b38; }
      .heading { font-size: 16px; font-weight: 750; }
      .label { font-size: 11px; font-weight: 700; }
      .small { font-size: 9px; fill: #62576e; }
      .tiny { font-size: 7px; fill: #72677c; font-weight: 650; letter-spacing: .07em; }
      .line { stroke: #ebe4f2; stroke-width: 1; }
      .field { fill: #ffffff; stroke: #d9cce9; }
      .button { fill: #70469e; }
      .button-text { fill: #ffffff; font-size: 9px; font-weight: 750; }
      .ghost { fill: #ffffff; stroke: #d9cce9; }
      .stage-label { fill: #f7f8ee; font-size: 17px; font-weight: 750; }
      .stage-muted { fill: #7b817d; font-size: 17px; font-weight: 750; }
      .stage-small { fill: #9aa69f; font-size: 7px; font-weight: 650; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f8f6fb"/>

  <!-- Literal 58 px top bar at the 720 px height breakpoint -->
  <rect x="0" y="0" width="1280" height="58" fill="#ffffff"/>
  <line x1="0" y1="58" x2="1280" y2="58" class="line"/>
  <rect x="16" y="14" width="30" height="30" rx="9" fill="#aa8dde" stroke="#d8c9e9"/>
  <circle cx="31" cy="29" r="5" fill="#2f2142"/>
  <text x="56" y="25" class="label">OKAY KARAOKE STUDIO</text>
  <text x="56" y="39" class="tiny">WORD-LEVEL VIDEO EDITOR</text>
  <circle cx="494" cy="29" r="3" fill="#ff8a2b"/>
  <text x="505" y="33" class="small">Midnight Signals — Demo Ensemble</text>
  <rect x="1007" y="14" width="62" height="30" rx="8" class="ghost"/>
  <text x="1021" y="33" class="small">Save</text>
  <rect x="1077" y="14" width="82" height="30" rx="8" class="ghost"/>
  <text x="1091" y="33" class="small">Export data</text>
  <rect x="1167" y="14" width="97" height="30" rx="8" fill="#ff8a2b" stroke="#e66f12"/>
  <text x="1183" y="33" class="label" style="fill:#3c200e">Export video</text>

  <!-- Project inspector: literal 270 px -->
  <rect x="0" y="58" width="270" height="592" fill="#fcfbfd"/>
  <line x1="270" y1="58" x2="270" y2="650" class="line"/>
  <rect x="0" y="58" width="270" height="56" fill="#f6f1fa"/>
  <text x="16" y="78" class="tiny">DOCUMENT</text>
  <text x="16" y="99" class="heading">Project</text>
  <rect x="181" y="70" width="73" height="32" rx="9" class="button"/>
  <path d="M193 80h12M193 86h12M193 92h12M197 77v6M201 83v6M198 89v6" stroke="#fff" stroke-width="1.5"/>
  <text x="212" y="90" class="button-text">Style</text>
  <circle cx="248" cy="74" r="3" fill="#ff8a2b"/>

  <text x="16" y="137" class="tiny">SONG DETAILS</text>
  <text x="16" y="157" class="small">Title</text>
  <rect x="16" y="163" width="238" height="30" rx="8" class="field"/>
  <text x="27" y="182" class="small">Midnight Signals</text>
  <text x="16" y="213" class="small">Artist</text>
  <rect x="16" y="219" width="238" height="30" rx="8" class="field"/>
  <text x="27" y="238" class="small">Demo Ensemble</text>
  <text x="16" y="277" class="small">Global offset</text>
  <rect x="158" y="259" width="96" height="31" rx="8" class="field"/>
  <text x="190" y="279" class="small">0</text>
  <text x="231" y="279" class="tiny">ms</text>
  <line x1="16" y1="311" x2="254" y2="311" class="line"/>

  <text x="16" y="338" class="tiny">VOCAL TRACK</text>
  <rect x="16" y="348" width="238" height="94" rx="12" fill="#f3edf9" stroke="#9b78cf" stroke-width="1.5"/>
  <rect x="27" y="360" width="36" height="36" rx="10" fill="#22d3ee"/>
  <circle cx="45" cy="375" r="6" fill="none" stroke="#2f2142" stroke-width="1.5"/>
  <path d="M40 383l9-9M48 382l4 4" stroke="#2f2142" stroke-width="1.5"/>
  <text x="75" y="375" class="label">Lead Vocal</text>
  <text x="75" y="394" class="tiny">327/327 timed</text>
  <rect x="75" y="400" width="165" height="34" rx="8" fill="#ffffff" stroke="#d9cce9"/>
  <rect x="82" y="407" width="20" height="20" rx="5" fill="#22d3ee" stroke="#504758"/>
  <text x="110" y="421" class="small">Sung</text>
  <text x="156" y="421" class="tiny">#22D3EE</text>
  <line x1="16" y1="463" x2="254" y2="463" class="line"/>
  <text x="16" y="490" class="tiny">BACKING TRACK</text>
  <rect x="16" y="500" width="238" height="56" rx="9" class="field"/>
  <text x="28" y="522" class="small">demo-audio.wav</text>
  <text x="28" y="540" class="tiny">Linked file · 04:31</text>

  <!-- Workspace: 8 px padding, 390 px editor, 8 px gap, 596 px preview -->
  <rect x="270" y="58" width="1010" height="592" fill="#f8f6fb"/>

  <rect x="278" y="66" width="390" height="576" rx="13" fill="#ffffff" stroke="#d9cce9"/>
  <text x="294" y="87" class="tiny">PROJECT</text>
  <text x="294" y="108" class="heading">Video style</text>
  <text x="644" y="97" class="tiny" text-anchor="end">DRAFT</text>
  <circle cx="654" cy="94" r="3" fill="#ff8a2b"/>
  <line x1="278" y1="120" x2="668" y2="120" class="line"/>

  <rect x="288" y="134" width="111" height="34" rx="8" fill="#f1eafa"/>
  <text x="302" y="155" class="label" style="fill:#70469e">Background</text>
  <text x="302" y="191" class="small">Project lyrics</text>
  <text x="302" y="227" class="small">Title card</text>
  <text x="302" y="263" class="small">Stage frame</text>
  <text x="302" y="299" class="small">Vocal</text>
  <line x1="408" y1="132" x2="408" y2="583" class="line"/>

  <text x="424" y="151" class="label">Background</text>
  <text x="424" y="177" class="small">Style</text>
  <rect x="424" y="184" width="228" height="32" rx="8" class="field"/>
  <text x="436" y="204" class="small">Gradient</text>
  <path d="M636 196l5 5 5-5" fill="none" stroke="#72677c" stroke-width="1.5"/>

  <text x="424" y="245" class="small">Start color</text>
  <rect x="424" y="252" width="228" height="36" rx="8" class="field"/>
  <rect x="431" y="259" width="24" height="22" rx="5" fill="#173126"/>
  <text x="466" y="274" class="small">#173126</text>

  <text x="424" y="315" class="small">End color</text>
  <rect x="424" y="322" width="228" height="36" rx="8" class="field"/>
  <rect x="431" y="329" width="24" height="22" rx="5" fill="#07100d"/>
  <text x="466" y="344" class="small">#07100D</text>

  <rect x="424" y="382" width="228" height="72" rx="9" fill="#faf8fc" stroke="#ebe4f2"/>
  <text x="438" y="402" class="tiny">FIXED FOR MVP</text>
  <text x="438" y="422" class="small">145° diagonal · 2 colors</text>
  <text x="438" y="440" class="tiny">Preview and MP4 use the same fill.</text>

  <rect x="424" y="474" width="228" height="64" rx="9" fill="#fff8f1" stroke="#f2d2b9"/>
  <circle cx="438" cy="492" r="4" fill="#ff8a2b"/>
  <text x="450" y="496" class="small">Changes are not saved yet.</text>
  <text x="438" y="518" class="tiny">Apply once or cancel the whole session.</text>

  <line x1="278" y1="583" x2="668" y2="583" class="line"/>
  <rect x="455" y="597" width="76" height="32" rx="9" class="ghost"/>
  <text x="475" y="617" class="small">Cancel</text>
  <rect x="539" y="597" width="113" height="32" rx="9" class="button"/>
  <text x="561" y="617" class="button-text">Apply &amp; close</text>

  <!-- Preview card with true contained 578 x 325 16:9 video -->
  <rect x="676" y="66" width="596" height="576" rx="13" fill="#ffffff" stroke="#d9cce9"/>
  <text x="692" y="87" class="tiny">STAGE MONITOR</text>
  <text x="692" y="108" class="heading">Live Preview</text>
  <rect x="1100" y="81" width="72" height="28" rx="7" fill="#faf8fc" stroke="#ebe4f2"/>
  <text x="1114" y="99" class="small">Lines 3</text>
  <rect x="1178" y="81" width="78" height="28" rx="7" fill="#faf8fc" stroke="#ebe4f2"/>
  <text x="1190" y="99" class="small">Clear</text>

  <rect x="685" y="126" width="578" height="325" rx="10" fill="url(#stage-bg)" stroke="#31443a" stroke-width="2"/>
  <rect x="725" y="162" width="498" height="253" rx="3" fill="none" stroke="#31443a" stroke-width="1.2"/>
  <text x="738" y="181" class="stage-small">OKAY / STUDIO</text>
  <text x="1211" y="181" class="stage-small" text-anchor="end">00:38</text>
  <text x="974" y="275" class="stage-label" text-anchor="middle">Count the lights across the skyline</text>
  <text x="974" y="311" class="stage-muted" text-anchor="middle">Every voice is ready now</text>
  <rect x="765" y="261" width="22" height="7" rx="3.5" fill="#ff8a2b"/>
  <text x="738" y="401" class="stage-small">DEMO ENSEMBLE · MIDNIGHT SIGNALS</text>

  <rect x="692" y="470" width="564" height="52" rx="9" fill="#faf8fc" stroke="#ebe4f2"/>
  <circle cx="708" cy="486" r="4" fill="#9b78cf"/>
  <text x="720" y="490" class="small">Draft preview · exact 1920 × 1080 layout scaled to fit</text>
  <text x="708" y="509" class="tiny">16:9 surface 578 × 325 · no stretch · playback stays live</text>
  <rect x="692" y="534" width="564" height="82" rx="9" fill="#f3edf9" stroke="#d9cce9"/>
  <text x="708" y="555" class="tiny">CURRENT SECTION</text>
  <text x="708" y="576" class="label">Background · Gradient</text>
  <text x="708" y="596" class="small">Use playback and seeking below to inspect any moment.</text>

  <!-- Complete literal 70 px transport -->
  <rect x="0" y="650" width="1280" height="70" fill="#ffffff"/>
  <line x1="0" y1="650" x2="1280" y2="650" class="line"/>

  <rect x="16" y="658" width="238" height="54" rx="11" fill="#f7f5f8" stroke="#d9cce9"/>
  <rect x="24" y="667" width="36" height="36" rx="9" fill="#e7e1eb"/>
  <path d="M39 674l-5 11h6l-2 10 8-13h-6l4-8z" fill="#968c9d"/>
  <text x="70" y="680" class="label" style="fill:#968c9d">Start sync</text>
  <text x="70" y="697" class="tiny">Close Video style to enable</text>
  <rect x="209" y="674" width="36" height="21" rx="5" fill="#eee9f0" stroke="#d9cce9"/>
  <text x="217" y="688" class="tiny">Space</text>

  <g transform="translate(382 660)">
    <circle cx="17" cy="25" r="15" fill="#faf8fc"/>
    <path d="M21 18a9 9 0 1 0 1 12M21 18v7h-7" fill="none" stroke="#72677c" stroke-width="1.5"/>
    <text x="15" y="28" class="tiny">5</text>
    <circle cx="57" cy="25" r="15" fill="#faf8fc"/>
    <rect x="52" y="20" width="10" height="10" rx="1" fill="#72677c"/>
    <circle cx="102" cy="25" r="24" fill="#302b38"/>
    <path d="M97 16l15 9-15 9z" fill="#ffffff"/>
    <circle cx="147" cy="25" r="15" fill="#faf8fc"/>
    <path d="M143 18a9 9 0 1 1-1 12M143 18v7h7" fill="none" stroke="#72677c" stroke-width="1.5"/>
    <text x="145" y="28" class="tiny">5</text>
    <text x="180" y="29" class="label">00:38.214</text>
    <text x="244" y="29" class="small">/ 04:31.000</text>
  </g>

  <circle cx="896" cy="685" r="4" fill="#9b78cf"/>
  <text x="907" y="689" class="tiny">Audio linked</text>
  <text x="984" y="680" class="tiny">SPEED</text>
  <rect x="978" y="687" width="55" height="25" rx="7" class="field"/>
  <text x="992" y="703" class="small">1.0×</text>
  <path d="M1021 697l4 4 4-4" fill="none" stroke="#72677c"/>
  <text x="1050" y="690" class="small">Volume</text>
  <path d="M1102 679l8-5v22l-8-5h-6v-12z" fill="#72677c"/>
  <line x1="1120" y1="685" x2="1250" y2="685" stroke="#d9cce9" stroke-width="4" stroke-linecap="round"/>
  <line x1="1120" y1="685" x2="1207" y2="685" stroke="#9b78cf" stroke-width="4" stroke-linecap="round"/>
  <circle cx="1207" cy="685" r="7" fill="#70469e"/>
</svg>
