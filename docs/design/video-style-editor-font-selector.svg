<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Installed font selector at 1280 by 720</title>
  <desc id="desc">The Video style editor expands to 520 pixels for a full-pane font browser while preserving a 448 by 252 pixel contained Live Preview and the complete transport.</desc>
  <defs>
    <linearGradient id="stage-bg-font" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173126"/>
      <stop offset="1" stop-color="#07100d"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #302b38; }
      .heading { font-size: 16px; font-weight: 750; }
      .label { font-size: 11px; font-weight: 700; }
      .small { font-size: 9px; fill: #62576e; }
      .tiny { font-size: 7px; fill: #72677c; font-weight: 650; letter-spacing: .06em; }
      .line { stroke: #ebe4f2; stroke-width: 1; }
      .field { fill: #ffffff; stroke: #d9cce9; }
      .button { fill: #70469e; }
      .button-text { fill: #ffffff; font-size: 9px; font-weight: 750; }
      .ghost { fill: #ffffff; stroke: #d9cce9; }
      .list-text { font-size: 10px; fill: #504758; }
      .stage-text { fill: #f7f8ee; font-size: 15px; font-weight: 750; }
      .stage-muted { fill: #7b817d; font-size: 15px; font-weight: 750; }
      .stage-small { fill: #9aa69f; font-size: 6px; font-weight: 650; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f8f6fb"/>

